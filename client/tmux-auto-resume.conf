# Used only for SSH sessions marked by sshd SetEnv SSH_AUTO_RESUME=1.
set-option -g history-limit 200000
set-option -g status on
# Pin the per-attach env refresh list. Covers tmux >=3.x defaults plus
# WAYLAND_DISPLAY so X11 (ssh -X) and Wayland-over-SSH (waypipe, wayvnc)
# both stay usable across reconnects in new panes/windows.
set-option -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WAYLAND_DISPLAY WINDOWID XAUTHORITY"
