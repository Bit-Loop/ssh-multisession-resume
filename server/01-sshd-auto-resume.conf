# Match block for a single source endpoint.
# NOTE:
# - Keep Address as the authoritative match.
# - Multiple addresses use comma-separated Match syntax: Address 100.101.137.15,100.101.137.16
# - Add "Host ipad174.taile7c246.ts.net" only if reverse DNS is reliable.
Match Address 100.101.137.15
    SetEnv SSH_AUTO_RESUME=1
    ClientAliveInterval 15
    ClientAliveCountMax 3
